version: "3.8"
services:
  project-db:
    image: mysql:8.0.32
    container_name: project_mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: propify
      MYSQL_USER: user
      MYSQL_PASSWORD: user
    ports:
      - "3307:3306"
    volumes:
      - project_mysql_data:/var/lib/mysql

volumes:
  project_mysql_data:


version: '3.8'

services:
  redis:
    image: redis:7
    container_name: redis
    command: redis-server --requirepass redispassword --save ""
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - app-network
    restart: always

volumes:
  redis_data:
networks:
  app-network:
