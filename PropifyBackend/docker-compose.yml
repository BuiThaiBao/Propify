version: "3.8"

services:
  redis:
    image: redis:7
    container_name: propify_backend_redis
    command: redis-server --requirepass redispassword --save ""
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - app-network
    restart: always

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: propify_backend_app
    restart: always
    working_dir: /var/www/html
    volumes:
      - .:/var/www/html
    networks:
      - app-network
    depends_on:
      - redis

  web:
    image: nginx:alpine
    container_name: propify_backend_nginx
    restart: always
    ports:
      - "8000:80"
    volumes:
      - .:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - app-network
    depends_on:
      - app

  queue:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: propify_backend_queue
    restart: always
    working_dir: /var/www/html
    command: php artisan queue:work
    volumes:
      - .:/var/www/html
    networks:
      - app-network
    depends_on:
      - redis
      - app

  reverb:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: propify_backend_reverb
    restart: always
    working_dir: /var/www/html
    command: php artisan reverb:start
    ports:
      - "8080:8080"
    volumes:
      - .:/var/www/html
    networks:
      - app-network
    depends_on:
      - app

volumes:
  redis_data:

networks:
  app-network:
